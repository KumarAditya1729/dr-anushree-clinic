<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <!-- Soft surrounding glow -->
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <linearGradient id="blueGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#1d4ed8" />
    </linearGradient>
    <linearGradient id="lightGradient" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#60a5fa" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#bfdbfe" stop-opacity="1" />
    </linearGradient>
  </defs>

  <!-- Solid white minimal background for app icon aesthetics -->
  <rect width="120" height="120" rx="28" fill="#ffffff" />

  <!-- Clean geometric tooth vector -->
  <path d="M 30 35 
           Q 45 20, 60 35 
           Q 75 20, 90 35 
           C 100 50, 95 80, 80 95 
           Q 70 85, 65 75 
           Q 60 70, 55 75 
           Q 50 85, 40 95 
           C 25 80, 20 50, 30 35 Z" 
        fill="url(#blueGradient)" filter="url(#glow)"/>

  <!-- Inner glowing highlight for that 2030 tech feel -->
  <path d="M 40 42 
           L 60 55 
           L 80 42 
           L 70 70 
           L 60 62 
           L 50 70 Z" 
        fill="url(#lightGradient)" opacity="0.9" />
</svg>
